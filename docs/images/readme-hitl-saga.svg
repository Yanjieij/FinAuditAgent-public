<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">人工审批与 Saga 补偿</title>
  <desc id="desc">HumanReview 审批载荷、checkpoint 暂停、恢复执行和 Saga 逆序补偿。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}.step{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.3}.blue{fill:#eff6ff;stroke:#60a5fa}.green{fill:#ecfdf5;stroke:#34d399}.orange{fill:#fff7ed;stroke:#fb923c}.red{fill:#fef2f2;stroke:#f87171}.dark{fill:#0f172a}.txt{font-family:Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#1e293b}.title{font-size:30px;font-weight:700}.sub{font-size:14px;fill:#64748b}.h2{font-size:18px;font-weight:700}.small{font-size:13px}.tiny{font-size:12px;fill:#64748b}.line{stroke:#475569;stroke-width:1.8;fill:none}.comp{stroke:#dc2626;stroke-width:1.8;stroke-dasharray:7 5;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="redArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#dc2626"/></marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text x="56" y="58" class="txt title">人工审批与 Saga 补偿</text>
  <text x="56" y="86" class="txt sub">审批前暂停并验签；审批后才进入副作用执行；执行失败按逆序补偿已成功步骤</text>

  <rect x="56" y="130" width="546" height="476" rx="10" class="panel"/>
  <text x="84" y="164" class="txt h2">HITL 审批链路</text>
  <rect x="102" y="210" width="150" height="62" rx="8" class="step"/>
  <text x="177" y="235" text-anchor="middle" class="txt small">Drafter</text>
  <text x="177" y="256" text-anchor="middle" class="txt tiny">draft + verify_report</text>
  <rect x="382" y="210" width="150" height="62" rx="8" class="orange"/>
  <text x="457" y="235" text-anchor="middle" class="txt small">HumanReview</text>
  <text x="457" y="256" text-anchor="middle" class="txt tiny">amount → role</text>
  <path d="M252 241 H382" class="line" marker-end="url(#arrow)"/>

  <rect x="102" y="336" width="150" height="78" rx="8" class="orange"/>
  <text x="177" y="363" text-anchor="middle" class="txt small">ApprovalPayload</text>
  <text x="177" y="386" text-anchor="middle" class="txt tiny">state_hash</text>
  <text x="177" y="404" text-anchor="middle" class="txt tiny">amount · expires_at</text>
  <rect x="382" y="336" width="150" height="78" rx="8" class="orange"/>
  <text x="457" y="363" text-anchor="middle" class="txt small">HMAC 签名</text>
  <text x="457" y="386" text-anchor="middle" class="txt tiny">防篡改</text>
  <text x="457" y="404" text-anchor="middle" class="txt tiny">verify_signature()</text>
  <path d="M457 272 V336" class="line" marker-end="url(#arrow)"/>
  <path d="M252 375 H382" class="line" marker-end="url(#arrow)"/>

  <rect x="102" y="478" width="150" height="64" rx="8" class="blue"/>
  <text x="177" y="505" text-anchor="middle" class="txt small">Checkpoint</text>
  <text x="177" y="526" text-anchor="middle" class="txt tiny">interrupt_before</text>
  <rect x="382" y="478" width="150" height="64" rx="8" class="green"/>
  <text x="457" y="505" text-anchor="middle" class="txt small">Resume</text>
  <text x="457" y="526" text-anchor="middle" class="txt tiny">approved</text>
  <path d="M177 414 V478" class="line" marker-end="url(#arrow)"/>
  <path d="M457 414 V478" class="line" marker-end="url(#arrow)"/>
  <path d="M252 510 H382" class="line" marker-end="url(#arrow)"/>
  <text x="102" y="576" class="txt tiny">pending / rejected / timeout：不进入 Execute</text>

  <rect x="678" y="130" width="546" height="476" rx="10" class="panel"/>
  <text x="706" y="164" class="txt h2">Saga 执行与补偿链路</text>
  <rect x="728" y="226" width="120" height="62" rx="8" class="green"/>
  <text x="788" y="251" text-anchor="middle" class="txt small">Step 1</text>
  <text x="788" y="272" text-anchor="middle" class="txt tiny">book_entry</text>
  <rect x="916" y="226" width="120" height="62" rx="8" class="green"/>
  <text x="976" y="251" text-anchor="middle" class="txt small">Step 2</text>
  <text x="976" y="272" text-anchor="middle" class="txt tiny">update_ticket</text>
  <rect x="1104" y="226" width="80" height="62" rx="8" class="red"/>
  <text x="1144" y="251" text-anchor="middle" class="txt small">Step 3</text>
  <text x="1144" y="272" text-anchor="middle" class="txt tiny">notify</text>
  <path d="M848 257 H916 M1036 257 H1104" class="line" marker-end="url(#arrow)"/>

  <rect x="746" y="382" width="420" height="56" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="956" y="407" text-anchor="middle" class="txt small">saga_log 记录 done / failed / compensated</text>
  <text x="956" y="428" text-anchor="middle" class="txt tiny">resume 时 done 步骤按幂等键跳过</text>
  <path d="M1144 288 V382" class="line" marker-end="url(#arrow)"/>

  <path d="M1144 288 V338 H976 V288" class="comp" marker-end="url(#redArrow)"/>
  <path d="M976 338 H788 V288" class="comp" marker-end="url(#redArrow)"/>
  <text x="956" y="506" text-anchor="middle" fill="#dc2626" font-family="Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="13">Step 3 失败：compensate Step 2 → compensate Step 1</text>

  <rect x="756" y="552" width="400" height="34" rx="17" class="dark"/>
  <text x="956" y="574" text-anchor="middle" fill="#fff" font-family="Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="12.5" font-weight="700">最终一致性：适合 ERP / 工单 / 通知等跨系统副作用</text>

  <path d="M602 510 H678" class="line" marker-end="url(#arrow)"/>
  <text x="621" y="490" class="txt tiny">approved</text>
</svg>
