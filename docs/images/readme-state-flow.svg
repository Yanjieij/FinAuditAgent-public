<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">LangGraph 端到端状态流</title>
  <desc id="desc">FinAuditAgent 的 LangGraph 节点、条件路由、数字校验重写、人工审批中断与恢复。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}.node{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.3}.blue{fill:#eff6ff;stroke:#60a5fa}.cyan{fill:#ecfeff;stroke:#22d3ee}.green{fill:#ecfdf5;stroke:#34d399}.orange{fill:#fff7ed;stroke:#fb923c}.red{fill:#fef2f2;stroke:#f87171}.dark{fill:#0f172a}.txt{font-family:Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#1e293b}.title{font-size:30px;font-weight:700}.sub{font-size:14px;fill:#64748b}.small{font-size:13px}.tiny{font-size:12px;fill:#64748b}.line{stroke:#475569;stroke-width:1.8;fill:none}.dash{stroke:#64748b;stroke-width:1.6;stroke-dasharray:6 6;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="dashArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text x="56" y="58" class="txt title">LangGraph 端到端状态流</text>
  <text x="56" y="86" class="txt sub">固定状态机承载审计控制点；LLM 只在 Planner 和 Drafter 等有限节点内工作</text>

  <rect x="56" y="126" width="1168" height="460" rx="10" class="panel"/>

  <rect x="96" y="208" width="120" height="52" rx="8" class="blue"/>
  <text x="156" y="239" text-anchor="middle" class="txt small">Intake</text>
  <rect x="256" y="208" width="120" height="52" rx="8" class="orange"/>
  <text x="316" y="239" text-anchor="middle" class="txt small">Clarify</text>
  <rect x="416" y="208" width="120" height="52" rx="8" class="node"/>
  <text x="476" y="239" text-anchor="middle" class="txt small">Planner</text>

  <rect x="620" y="156" width="128" height="52" rx="8" class="cyan"/>
  <text x="684" y="187" text-anchor="middle" class="txt small">DataFetch</text>
  <rect x="620" y="254" width="128" height="52" rx="8" class="cyan"/>
  <text x="684" y="285" text-anchor="middle" class="txt small">DocRAG</text>
  <rect x="620" y="352" width="128" height="52" rx="8" class="cyan"/>
  <text x="684" y="383" text-anchor="middle" class="txt small">Analyze</text>
  <rect x="620" y="470" width="128" height="52" rx="8" class="green"/>
  <text x="684" y="501" text-anchor="middle" class="txt small">Drafter</text>

  <rect x="884" y="470" width="140" height="52" rx="8" class="orange"/>
  <text x="954" y="501" text-anchor="middle" class="txt small">HumanReview</text>
  <rect x="1082" y="388" width="94" height="48" rx="8" class="red"/>
  <text x="1129" y="417" text-anchor="middle" class="txt small">END</text>
  <rect x="884" y="584" width="140" height="52" rx="8" class="green"/>
  <text x="954" y="615" text-anchor="middle" class="txt small">Execute</text>
  <rect x="1082" y="584" width="94" height="52" rx="8" class="green"/>
  <text x="1129" y="615" text-anchor="middle" class="txt small">Notify</text>

  <path d="M216 234 H256" class="line" marker-end="url(#arrow)"/>
  <path d="M376 234 H416" class="line" marker-end="url(#arrow)"/>
  <path d="M536 234 H574 V182 H620" class="line" marker-end="url(#arrow)"/>
  <path d="M684 208 V254" class="line" marker-end="url(#arrow)"/>
  <path d="M684 306 V352" class="line" marker-end="url(#arrow)"/>
  <path d="M684 404 V470" class="line" marker-end="url(#arrow)"/>
  <path d="M748 496 H884" class="line" marker-end="url(#arrow)"/>
  <path d="M954 522 V584" class="line" marker-end="url(#arrow)"/>
  <path d="M1024 610 H1082" class="line" marker-end="url(#arrow)"/>

  <path d="M1024 496 H1054 V412 H1082" class="line" marker-end="url(#arrow)"/>
  <text x="1088" y="472" class="txt tiny">pending / rejected</text>
  <text x="1094" y="490" class="txt tiny">timeout</text>
  <text x="976" y="562" class="txt tiny">approved + resume</text>

  <path d="M376 208 V162 H256 V208" class="dash" marker-end="url(#dashArrow)"/>
  <text x="258" y="151" class="txt tiny">需要澄清则结束并等待用户补充</text>
  <path d="M748 496 H812 V446 H700 V470" class="dash" marker-end="url(#dashArrow)"/>
  <text x="792" y="424" class="txt tiny">number_verifier 失败</text>
  <text x="792" y="442" class="txt tiny">且 iterations &lt; 3</text>

  <rect x="814" y="326" width="220" height="64" rx="8" class="node"/>
  <text x="924" y="352" text-anchor="middle" class="txt small">Checkpoint</text>
  <text x="924" y="374" text-anchor="middle" class="txt tiny">interrupt_before=["execute"]</text>
  <path d="M954 470 V390" class="line" marker-end="url(#arrow)"/>

  <rect x="92" y="612" width="680" height="62" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="118" y="637" class="txt small">AgentState 关键字段</text>
  <text x="118" y="660" class="txt tiny">question · plan · sql_results · rag_chunks · sandbox_execs · draft · verify_report · approval_status · saga_log</text>

  <rect x="1060" y="664" width="138" height="38" rx="19" class="dark"/>
  <text x="1129" y="688" text-anchor="middle" fill="#fff" font-family="Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="13" font-weight="700">final_answer</text>
  <path d="M1129 636 V664" class="line" marker-end="url(#arrow)"/>
</svg>
