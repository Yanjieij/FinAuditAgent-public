<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">SQL 与文档 RAG 双证据管线</title>
  <desc id="desc">Text-to-SQL 安全管线和文档 RAG 引证管线。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:1.4}.step{fill:#f8fafc;stroke:#94a3b8;stroke-width:1.3}.guard{fill:#fef2f2;stroke:#f87171}.good{fill:#ecfdf5;stroke:#34d399}.blue{fill:#eff6ff;stroke:#60a5fa}.dark{fill:#0f172a}.txt{font-family:Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif;fill:#1e293b}.title{font-size:30px;font-weight:700}.sub{font-size:14px;fill:#64748b}.h2{font-size:18px;font-weight:700}.small{font-size:13px}.tiny{font-size:12px;fill:#64748b}.line{stroke:#475569;stroke-width:1.8;fill:none}.dash{stroke:#64748b;stroke-width:1.6;stroke-dasharray:6 6;fill:none}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#475569"/></marker>
    <marker id="dashArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>

  <rect class="bg" width="1280" height="720"/>
  <text x="56" y="58" class="txt title">双证据管线：数据库事实 + 文档原文</text>
  <text x="56" y="86" class="txt sub">SQL 负责结构化指标，RAG 负责单据与准则原文；两条链路都输出可追溯引用</text>

  <rect x="56" y="124" width="1168" height="250" rx="10" class="panel"/>
  <text x="84" y="158" class="txt h2">Text-to-SQL 安全链路</text>
  <text x="84" y="182" class="txt tiny">sql_agent/retry_loop.py</text>
  <rect x="92" y="224" width="140" height="62" rx="8" class="step"/>
  <text x="162" y="249" text-anchor="middle" class="txt small">用户问题</text>
  <text x="162" y="270" text-anchor="middle" class="txt tiny">审计查询</text>
  <rect x="282" y="224" width="140" height="62" rx="8" class="step"/>
  <text x="352" y="249" text-anchor="middle" class="txt small">Schema Linking</text>
  <text x="352" y="270" text-anchor="middle" class="txt tiny">术语表 + BM25</text>
  <rect x="472" y="224" width="140" height="62" rx="8" class="step"/>
  <text x="542" y="249" text-anchor="middle" class="txt small">SQL Gen</text>
  <text x="542" y="270" text-anchor="middle" class="txt tiny">语义层占位</text>
  <rect x="662" y="210" width="150" height="90" rx="8" class="guard"/>
  <text x="737" y="238" text-anchor="middle" class="txt small">AST Validator</text>
  <text x="737" y="260" text-anchor="middle" class="txt tiny">SELECT only</text>
  <text x="737" y="280" text-anchor="middle" class="txt tiny">LIMIT + 禁函数</text>
  <rect x="862" y="224" width="140" height="62" rx="8" class="step"/>
  <text x="932" y="249" text-anchor="middle" class="txt small">Dry Run</text>
  <text x="932" y="270" text-anchor="middle" class="txt tiny">LIMIT 0 / EXPLAIN</text>
  <rect x="1052" y="224" width="120" height="62" rx="8" class="good"/>
  <text x="1112" y="249" text-anchor="middle" class="txt small">Execute</text>
  <text x="1112" y="270" text-anchor="middle" class="txt tiny">只读 + RLS</text>
  <path d="M232 255 H282 M422 255 H472 M612 255 H662 M812 255 H862 M1002 255 H1052" class="line" marker-end="url(#arrow)"/>
  <path d="M932 286 V326 H542 V286" class="dash" marker-end="url(#dashArrow)"/>
  <text x="650" y="348" text-anchor="middle" class="txt tiny">校验 / dry-run / 执行失败：规整化错误反馈给 LLM，最多重试 3 次；仍失败则 Clarify</text>

  <rect x="56" y="426" width="1168" height="250" rx="10" class="panel"/>
  <text x="84" y="460" class="txt h2">文档 RAG 引证链路</text>
  <text x="84" y="484" class="txt tiny">rag/layout.py · semantic_chunker.py · hybrid_retriever.py · citation.py</text>
  <rect x="92" y="526" width="140" height="62" rx="8" class="step"/>
  <text x="162" y="551" text-anchor="middle" class="txt small">PDF / 单据</text>
  <text x="162" y="572" text-anchor="middle" class="txt tiny">财报、报销单</text>
  <rect x="282" y="526" width="140" height="62" rx="8" class="step"/>
  <text x="352" y="551" text-anchor="middle" class="txt small">版面分析</text>
  <text x="352" y="572" text-anchor="middle" class="txt tiny">text/table/kv</text>
  <rect x="472" y="526" width="140" height="62" rx="8" class="step"/>
  <text x="542" y="551" text-anchor="middle" class="txt small">语义切分</text>
  <text x="542" y="572" text-anchor="middle" class="txt tiny">章节 + 表格行</text>
  <rect x="662" y="512" width="150" height="90" rx="8" class="blue"/>
  <text x="737" y="540" text-anchor="middle" class="txt small">Hybrid Search</text>
  <text x="737" y="562" text-anchor="middle" class="txt tiny">BM25 + Dense</text>
  <text x="737" y="582" text-anchor="middle" class="txt tiny">Table index + RRF</text>
  <rect x="862" y="526" width="140" height="62" rx="8" class="step"/>
  <text x="932" y="551" text-anchor="middle" class="txt small">Rerank</text>
  <text x="932" y="572" text-anchor="middle" class="txt tiny">重排 / 截断</text>
  <rect x="1052" y="526" width="120" height="62" rx="8" class="good"/>
  <text x="1112" y="551" text-anchor="middle" class="txt small">Citation</text>
  <text x="1112" y="572" text-anchor="middle" class="txt tiny">page + bbox</text>
  <path d="M232 557 H282 M422 557 H472 M612 557 H662 M812 557 H862 M1002 557 H1052" class="line" marker-end="url(#arrow)"/>
  <rect x="390" y="626" width="500" height="34" rx="17" class="dark"/>
  <text x="640" y="648" text-anchor="middle" fill="#fff" font-family="Arial,'Noto Sans CJK SC','Microsoft YaHei',sans-serif" font-size="12.5" font-weight="700">RAGChunkRef：chunk_id · doc_id · page · bbox · section_path · score</text>
</svg>
